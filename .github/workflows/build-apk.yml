name: Build APK

on:
  push:
    paths:
      - 'xiancaibao-apk/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Build Debug APK
        working-directory: xiancaibao-apk
        run: |
          # Use Gradle wrapper or fall back to system gradle
          if [ -f gradlew ]; then ./gradlew assembleDebug --no-daemon; else gradle assembleDebug --no-daemon; fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 线材宝-APK
          path: xiancaibao-apk/app/build/outputs/apk/debug/app-debug.apk
