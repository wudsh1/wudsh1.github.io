<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>线材宝 — 线材切割计算排版工具</title>

<!-- PWA Meta Tags -->
<meta name="theme-color" content="#1e1e1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="线材宝">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="线材切割优化排版工具 - 智能计算最佳切割方案">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --border: #e0dcd5;
    --text: #2c2c2a;
    --text-muted: #8a8780;
    --accent: #d4641a;
    --accent-hover: #b85512;
    --accent-light: #fef3e8;
    --green: #2d8a56;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    --transition: 0.15s ease;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 15px; height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: var(--safe-bottom);
    overscroll-behavior: none;
  }

  /* ─── Header ─── */
  .header {
    background: #1e1e1c;
    color: #f0ede5;
    padding: calc(12px + var(--safe-top)) 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid var(--accent);
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #fff;
    flex-shrink: 0;
  }
  .header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.02em; }
  .header .sub { font-size: 0.72rem; color: #9a9790; margin-left: 4px; font-weight: 400; display: none; }

  /* Install banner */
  .install-banner {
    display: none;
    background: var(--accent-light);
    border-bottom: 1px solid var(--accent);
    padding: 10px 16px;
    text-align: center;
    font-size: 0.82rem;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    position: sticky; top: 52px; z-index: 99;
  }
  .install-banner.show { display: block; }

  /* ─── Layout ─── */
  .main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* Sticky sidebar on desktop */
  .sidebar {
    position: sticky;
    top: 70px;
    max-height: calc(100vh - 90px);
    overflow-y: auto;
    scrollbar-width: thin;
    padding-right: 4px;
  }

  /* Collapsible section */
  .collapse-toggle {
    margin-left: auto;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    padding: 2px 10px;
    border-radius: 12px;
    border: 1px solid var(--accent);
    background: transparent;
    font-family: var(--font);
    transition: all var(--transition);
    white-space: nowrap;
  }
  .collapse-toggle:hover { background: var(--accent-light); }
  .collapsible-content.collapsed { display: none; }
  .compact-list { font-size: 0.76rem; color: var(--text-muted); line-height: 1.6; }
  .compact-list span { display: inline-block; margin-right: 3px; }

  /* ─── Card ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.88rem;
    display: flex; align-items: center; gap: 6px;
    background: #fafaf7;
  }
  .card-header .icon { font-size: 1rem; }
  .card-body { padding: 14px 16px; }

  /* ─── Form elements ─── */
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: var(--font);
    background: #fcfcf9;
    transition: border var(--transition);
    -moz-appearance: textfield;
    min-height: 44px;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { opacity: 1; height: 32px; }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    background: #fff;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 0.88rem;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    min-height: 44px;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: #f0ede7; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #e8e4dc; }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    padding: 6px 10px; font-size: 0.85rem; min-height: 36px;
  }
  .btn-ghost:hover { color: var(--red); background: var(--red-light); }
  .btn-sm { padding: 6px 14px; font-size: 0.78rem; min-height: 36px; }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }

  /* ─── Inline row ─── */
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row > * { flex: 1; min-width: 0; }
  .row > .shrink { flex: 0 0 auto; }

  /* ─── Item list ─── */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-row {
    display: flex; gap: 8px; align-items: flex-end;
    padding: 10px; background: #fafaf7;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
  }
  .item-row input { background: #fff; }
  .item-row .btn-ghost { padding: 6px 8px; font-size: 0.9rem; min-height: 32px; }

  .add-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted);
    font-size: 0.85rem; font-family: var(--font);
    cursor: pointer; transition: all var(--transition);
    width: 100%; justify-content: center;
    min-height: 44px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ─── Presets ─── */
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .preset {
    padding: 6px 12px; font-size: 0.78rem;
    border: 1px solid var(--border); border-radius: 20px;
    background: #fff; cursor: pointer; font-family: var(--font);
    color: var(--text-muted); transition: all var(--transition);
    min-height: 36px; -webkit-user-select: none; user-select: none;
  }
  .preset:active { transform: scale(0.95); }
  .preset:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── Optimize button area ─── */
  .optimize-area { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
  .btn-optimize { flex: 1; padding: 14px 24px; font-size: 1.05rem; letter-spacing: 0.03em; }

  /* ─── Results ─── */
  .results-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--text-muted); text-align: center; gap: 12px;
  }
  .results-empty .empty-icon { font-size: 3rem; opacity: 0.4; }
  .results-empty p { font-size: 0.9rem; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 10px; text-align: center;
  }
  .stat-card .stat-value { font-size: 1.35rem; font-weight: 700; line-height: 1.2; }
  .stat-card .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-accent { color: var(--accent); }
  .stat-green { color: var(--green); }
  .stat-red { color: var(--red); }

  /* Bar visualization */
  .bar-container { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label {
    width: 50px; font-size: 0.74rem; font-weight: 600;
    color: var(--text-muted); text-align: right; flex-shrink: 0; white-space: nowrap;
  }
  .bar-wrap {
    flex: 1; height: 36px; background: #f0ede7;
    border-radius: 6px; overflow: hidden; display: flex;
    position: relative; border: 1px solid var(--border);
  }
  .bar-wrap .segment {
    height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 600; color: #fff;
    position: relative; cursor: default; transition: filter 0.12s;
    min-width: 0; overflow: hidden;
  }
  .bar-wrap .segment:hover { filter: brightness(1.1); }
  .bar-wrap .segment.waste {
    background: repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(0,0,0,0.08) 4px, rgba(0,0,0,0.08) 8px);
    color: var(--text-muted); font-weight: 500; font-size: 0.65rem;
  }
  .bar-wrap .segment.kerf { background: #555; color: transparent; }
  .bar-info { width: 100px; flex-shrink: 0; font-size: 0.7rem; color: var(--text-muted); text-align: left; white-space: nowrap; }

  /* Segment color palette */
  .seg-0 { background: #d4641a; } .seg-1 { background: #2d7fa8; } .seg-2 { background: #5a8a3c; }
  .seg-3 { background: #8b5ea8; } .seg-4 { background: #c47a2a; } .seg-5 { background: #3d8690; }
  .seg-6 { background: #a8543c; } .seg-7 { background: #4a7a5a; } .seg-8 { background: #6e5c9a; }
  .seg-9 { background: #b06830; } .seg-10 { background: #25667a; } .seg-11 { background: #6e8638; }
  .seg-12 { background: #9a5480; } .seg-13 { background: #7a5a3a; } .seg-14 { background: #3a6a7a; }

  /* Summary table */
  .summary-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 8px; }
  .summary-table th {
    text-align: left; padding: 8px 10px; background: #fafaf7;
    font-weight: 600; color: var(--text-muted); font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--border);
  }
  .summary-table td { padding: 8px 10px; border-bottom: 1px solid #f0ede7; }
  .summary-table .mono { font-family: "SF Mono", "Cascadia Code", "Consolas", monospace; }

  /* Error */
  .error-msg {
    background: var(--red-light); border: 1px solid #f5c6cb; color: var(--red);
    padding: 10px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; margin-top: 10px;
  }

  /* Tooltip */
  .tooltip-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--border); color: var(--text-muted);
    font-size: 0.65rem; font-weight: 700; cursor: help;
    margin-left: 2px; vertical-align: middle;
  }

  /* ─── Mobile layout ─── */
  @media (max-width: 960px) {
    .main { grid-template-columns: 1fr; padding: 12px; gap: 14px; }
    .sidebar { position: static; max-height: none; overflow: visible; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .header { padding: calc(10px + var(--safe-top)) 12px 10px; }
    .header h1 { font-size: 1.05rem; }
    .header .sub { display: inline; }
    .bar-label { width: 40px; font-size: 0.68rem; }
    .bar-info { width: 80px; font-size: 0.65rem; }
    .bar-wrap { height: 32px; }

    /* Sticky optimize button on mobile */
    .optimize-area-sticky {
      position: sticky;
      bottom: 0;
      z-index: 90;
      background: var(--bg);
      padding: 10px 12px;
      padding-bottom: calc(10px + var(--safe-bottom));
      margin: 0 -12px -12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }
    .optimize-area-sticky .btn { flex: 1; }
    .optimize-area { display: none; }
  }
  @media (min-width: 961px) {
    .optimize-area-sticky { display: none; }
  }

  @media (max-width: 500px) {
    html { font-size: 14px; }
    .stats-row { gap: 6px; }
    .stat-card { padding: 10px 6px; }
    .stat-card .stat-value { font-size: 1.15rem; }
    .row { flex-direction: column; gap: 8px; }
    .bar-row { flex-wrap: wrap; }
    .bar-info { width: 100%; padding-left: 48px; }
    .bar-wrap { height: 28px; }
    .card-body { padding: 10px 12px; }
    .header { padding: 8px 10px; }
  }

  /* Print — clean output, only results */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .header, .sidebar, .optimize-area, .add-btn, .btn-ghost, .presets,
    .optimize-area-sticky, .install-banner,
    .no-print { display: none !important; }
    .main { display: block !important; padding: 0; max-width: 100%; }
    .card { box-shadow: none; break-inside: avoid; }
    body { background: #fff; font-size: 12px; }
    .bar-wrap { border: 1px solid #ccc; }
  }

  /* Animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.25s ease forwards; }
</style>
</head>
<body>

<!-- ─── Install Banner (shown before install) ─── -->
<div class="install-banner" id="installBanner" onclick="this.style.display='none'">
  💡 点击右上角 ⋮ → <strong>添加到主屏幕</strong>，像 App 一样使用
</div>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-logo">线</div>
  <h1>线材宝</h1>
  <span class="sub">切割计算 · 智能排版</span>
</header>

<!-- ─── Main Layout ─── -->
<div class="main">

  <!-- ── Left: Input Panel ── -->
  <div class="sidebar">

    <!-- Raw material card -->
    <div class="card" style="margin-bottom: 14px;">
      <div class="card-header"><span class="icon">📐</span> 原材料规格</div>
      <div class="card-body">
        <div class="presets" id="rawPresets">
          <button class="preset" onclick="addRawPreset(6000)">6米</button>
          <button class="preset" onclick="addRawPreset(4000)">4米</button>
          <button class="preset" onclick="addRawPreset(3000)">3米</button>
          <button class="preset" onclick="addRawPreset(9000)">9米</button>
          <button class="preset" onclick="addRawPreset(12000)">12米</button>
        </div>
        <div class="item-list" id="rawList"></div>
        <button class="add-btn" onclick="addRawRow()" style="margin-top:8px;">+ 添加原材料规格</button>
      </div>
    </div>

    <!-- Required pieces card -->
    <div class="card" style="margin-bottom: 14px;">
      <div class="card-header"><span class="icon">✂️</span> 所需线段</div>
      <div class="card-body">
        <div class="presets" id="piecePresets">
          <button class="preset" onclick="loadExample('windows')">窗框示例</button>
          <button class="preset" onclick="loadExample('fence')">围栏示例</button>
          <button class="preset" onclick="loadExample('shelving')">货架示例</button>
        </div>
        <div class="item-list" id="pieceList"></div>
        <button class="add-btn" onclick="addPieceRow()" style="margin-top:8px;">+ 添加线段需求</button>
      </div>
    </div>

    <!-- Settings card -->
    <div class="card" style="margin-bottom: 14px;">
      <div class="card-header"><span class="icon">⚙️</span> 切割参数</div>
      <div class="card-body">
        <div class="row">
          <div>
            <label>锯缝宽度 (mm) <span class="tooltip-icon" title="每次切割时锯片损耗的宽度，默认为3mm">?</span></label>
            <input type="number" id="kerf" value="3" min="0" max="50" step="0.5">
          </div>
          <div>
            <label>端头损耗 (mm) <span class="tooltip-icon" title="每根原材料两端无法使用的部分，默认0">?</span></label>
            <input type="number" id="endTrim" value="0" min="0" max="200" step="1">
          </div>
        </div>
      </div>
    </div>

    <!-- Desktop optimize button -->
    <div class="optimize-area">
      <button class="btn btn-primary btn-optimize" onclick="optimize()">🔍 开始计算排版</button>
      <button class="btn btn-secondary" onclick="resetAll()">重置</button>
    </div>
    <p style="font-size:0.7rem;color:var(--text-muted);margin-top:6px;text-align:center;">
      算法：最佳适配递减 (BFD) · 多规格原材料混排
    </p>
  </div>

  <!-- ── Right: Results Panel ── -->
  <div id="resultsPanel">
    <div class="results-empty" id="emptyState">
      <div class="empty-icon">📊</div>
      <p>在左侧输入原材料和线段需求</p>
      <p style="font-size:0.78rem;color:#bbb;">点击「开始计算排版」查看优化结果</p>
    </div>
    <div id="results" style="display:none;"></div>
  </div>

</div>

<!-- ─── Mobile sticky optimize bar ─── -->
<div class="optimize-area-sticky" id="stickyBar" style="display:none;">
  <button class="btn btn-primary btn-optimize" onclick="optimize()">🔍 开始计算排版</button>
  <button class="btn btn-secondary" onclick="resetAll()">重置</button>
</div>

<script>
// ─── PWA: Service Worker registration ───
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('[PWA] Service Worker registered:', reg.scope);
    }).catch(err => {
      console.log('[PWA] SW registration failed:', err);
    });
  });
}

// ─── PWA: Show install banner ───
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window._deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  if (banner) banner.classList.add('show');
});

// ─── State ───
let rawCounter = 0;
let pieceCounter = 0;

// ─── Initialize ───
function init() {
  addRawRow(6000, 10);
  addPieceRow(1800, 3);
  addPieceRow(1200, 4);
  addPieceRow(800, 2);
  updateStickyBar();
}

// ─── Show/hide sticky mobile bar ───
function updateStickyBar() {
  const bar = document.getElementById('stickyBar');
  if (!bar) return;
  const isMobile = window.innerWidth <= 960;
  bar.style.display = isMobile ? 'flex' : 'none';
}
window.addEventListener('resize', updateStickyBar);

// ─── Raw material rows ───
function addRawRow(length = '', qty = '') {
  const id = ++rawCounter;
  const div = document.createElement('div');
  div.className = 'item-row fade-in';
  div.id = 'raw-' + id;
  div.innerHTML = `
    <div style="flex:1;min-width:0;">
      <label>长度 (mm)</label>
      <input type="number" value="${length}" min="100" max="50000" step="1" placeholder="如 6000" inputmode="numeric">
    </div>
    <div style="flex:1;min-width:0;">
      <label>可用数量</label>
      <input type="number" value="${qty}" min="1" max="9999" step="1" placeholder="数量" inputmode="numeric">
    </div>
    <button class="btn btn-ghost" onclick="removeRow('raw-${id}')" title="删除" style="flex:0 0 auto;">✕</button>
  `;
  document.getElementById('rawList').appendChild(div);
}

function addRawPreset(len) {
  const rows = document.querySelectorAll('#rawList .item-row');
  for (const row of rows) {
    const inputs = row.querySelectorAll('input');
    if (parseFloat(inputs[0].value) === len) return;
  }
  addRawRow(len, 10);
}

// ─── Piece rows ───
function addPieceRow(length = '', qty = '') {
  const id = ++pieceCounter;
  const div = document.createElement('div');
  div.className = 'item-row fade-in';
  div.id = 'piece-' + id;
  div.innerHTML = `
    <div style="flex:1;min-width:0;">
      <label>长度 (mm)</label>
      <input type="number" value="${length}" min="1" max="50000" step="1" placeholder="如 1800" inputmode="numeric">
    </div>
    <div style="flex:1;min-width:0;">
      <label>数量</label>
      <input type="number" value="${qty}" min="1" max="9999" step="1" placeholder="数量" inputmode="numeric">
    </div>
    <button class="btn btn-ghost" onclick="removeRow('piece-${id}')" title="删除" style="flex:0 0 auto;">✕</button>
  `;
  document.getElementById('pieceList').appendChild(div);
}

// ─── Remove row ───
function removeRow(rowId) {
  const el = document.getElementById(rowId);
  if (el) {
    if (el.closest('#rawList') && document.querySelectorAll('#rawList .item-row').length <= 1) return;
    el.remove();
  }
}

// ─── Collect input data ───
function collectRawMaterials() {
  const rows = document.querySelectorAll('#rawList .item-row');
  const raws = [];
  for (const row of rows) {
    const inputs = row.querySelectorAll('input');
    const len = parseFloat(inputs[0].value);
    const qty = parseInt(inputs[1].value);
    if (!isNaN(len) && len > 0 && !isNaN(qty) && qty > 0) raws.push({ length: len, qty: qty });
  }
  return raws;
}

function collectPieces() {
  const rows = document.querySelectorAll('#pieceList .item-row');
  const pieces = [];
  for (const row of rows) {
    const inputs = row.querySelectorAll('input');
    const len = parseFloat(inputs[0].value);
    const qty = parseInt(inputs[1].value);
    if (!isNaN(len) && len > 0 && !isNaN(qty) && qty > 0) pieces.push({ length: len, qty: qty });
  }
  return pieces;
}

// ─── Preset examples ───
function loadExample(type) {
  document.getElementById('pieceList').innerHTML = '';
  pieceCounter = 0;
  const examples = {
    windows: {
      pieces: [{length:2100,qty:4},{length:1500,qty:4},{length:900,qty:6},{length:600,qty:8}],
      raws: [{length:6000,qty:10}],
    },
    fence: {
      pieces: [{length:2500,qty:10},{length:1800,qty:5},{length:1200,qty:3}],
      raws: [{length:6000,qty:15}],
    },
    shelving: {
      pieces: [{length:1200,qty:12},{length:800,qty:8},{length:450,qty:20},{length:350,qty:16}],
      raws: [{length:6000,qty:8},{length:4000,qty:4}],
    },
  };
  const ex = examples[type];
  if (!ex) return;
  document.getElementById('rawList').innerHTML = '';
  rawCounter = 0;
  for (const r of ex.raws) addRawRow(r.length, r.qty);
  for (const p of ex.pieces) addPieceRow(p.length, p.qty);
  document.getElementById('results').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
}

// ─── Reset ───
function resetAll() {
  document.getElementById('rawList').innerHTML = '';
  document.getElementById('pieceList').innerHTML = '';
  rawCounter = 0; pieceCounter = 0;
  document.getElementById('kerf').value = '3';
  document.getElementById('endTrim').value = '0';
  addRawRow(6000, 10);
  addPieceRow(1800, 3); addPieceRow(1200, 4); addPieceRow(800, 2);
  document.getElementById('results').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
}

// ─── Color assignment ───
const pieceColorMap = new Map();
function getColor(pieceLen, idx) {
  const key = `${pieceLen}-${idx % 20}`;
  if (!pieceColorMap.has(key)) {
    const i = pieceColorMap.size % 15;
    pieceColorMap.set(key, `seg-${i}`);
  }
  return pieceColorMap.get(key);
}

// ─── Core optimization: Best-Fit Decreasing ───
function optimize() {
  const raws = collectRawMaterials();
  const pieces = collectPieces();
  const kerf = parseFloat(document.getElementById('kerf').value) || 0;
  const endTrim = parseFloat(document.getElementById('endTrim').value) || 0;

  if (raws.length === 0) { showError('请至少添加一种原材料规格。'); return; }
  if (pieces.length === 0) { showError('请至少添加一个线段需求。'); return; }

  const maxRaw = Math.max(...raws.map(r => r.length));
  const tooLong = pieces.filter(p => p.length > maxRaw - endTrim * 2);
  if (tooLong.length > 0) {
    showError(`以下线段超过最长原材料可用长度 (${maxRaw - endTrim * 2}mm)：${tooLong.map(p => p.length + 'mm').join('、')}`);
    return;
  }

  // Expand pieces
  let flatPieces = [];
  pieces.forEach(p => { for (let i = 0; i < p.qty; i++) flatPieces.push({ length: p.length, source: p }); });
  flatPieces.sort((a, b) => b.length - a.length);

  // Create raw instances
  let rawInstances = [];
  raws.forEach(r => {
    for (let i = 0; i < r.qty; i++) {
      rawInstances.push({
        totalLength: r.length, usableLength: r.length - endTrim * 2,
        remaining: r.length - endTrim * 2, cuts: [], kerfTotal: 0,
        used: false, type: r, originalLength: r.length,
      });
    }
  });

  // BFD
  let unplaced = [];
  for (const piece of flatPieces) {
    let bestIdx = -1, bestRemain = Infinity;
    for (let i = 0; i < rawInstances.length; i++) {
      const raw = rawInstances[i];
      const need = raw.cuts.length > 0 ? piece.length + kerf : piece.length;
      if (raw.remaining >= need && raw.remaining - need < bestRemain) {
        bestRemain = raw.remaining - need;
        bestIdx = i;
      }
    }
    if (bestIdx >= 0) {
      const raw = rawInstances[bestIdx];
      const need = raw.cuts.length > 0 ? piece.length + kerf : piece.length;
      raw.cuts.push({ length: piece.length, kerfBefore: raw.cuts.length > 0 ? kerf : 0 });
      raw.remaining -= need;
      raw.kerfTotal += (raw.cuts.length > 1 ? kerf : 0);
      raw.used = true;
    } else {
      unplaced.push(piece);
    }
  }

  if (unplaced.length > 0) {
    showError(`有 ${unplaced.length} 根线段无法排入，请增加原材料。`);
    return;
  }

  const usedInstances = rawInstances.filter(r => r.used);
  const totalRawLength = usedInstances.reduce((s, r) => s + r.totalLength, 0);
  const totalOutput = usedInstances.reduce((s, r) => s + r.cuts.reduce((cs, c) => cs + c.length, 0), 0);
  const totalWaste = usedInstances.reduce((s, r) => s + r.remaining + (r.totalLength - r.usableLength), 0);
  const utilization = totalRawLength > 0 ? (totalOutput / totalRawLength * 100) : 0;

  renderResults({ raws: usedInstances, totalRawLength, totalOutput, totalWaste, utilization, kerf, endTrim, pieceCount: flatPieces.length });

  // Scroll to results on mobile
  if (window.innerWidth <= 960) {
    document.getElementById('resultsPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ─── Render results ───
function renderResults(data) {
  const container = document.getElementById('results');
  document.getElementById('emptyState').style.display = 'none';
  container.style.display = 'block';
  container.className = 'fade-in';

  const { raws, totalRawLength, totalOutput, totalWaste, utilization, kerf, endTrim, pieceCount } = data;

  pieceColorMap.clear();
  const uniqueLengths = [...new Set(raws.flatMap(r => r.cuts.map(c => c.length)))].sort((a,b) => b-a);
  uniqueLengths.forEach((len, i) => getColor(len, i));

  let html = '';

  // Stats
  html += `<div class="stats-row">
    <div class="stat-card"><div class="stat-value">${raws.length}<span style="font-size:0.7rem;font-weight:400;"> 根</span></div><div class="stat-label">使用原材料</div></div>
    <div class="stat-card"><div class="stat-value stat-green">${pieceCount}<span style="font-size:0.7rem;font-weight:400;"> 段</span></div><div class="stat-label">产出线段</div></div>
    <div class="stat-card"><div class="stat-value" style="color:${utilization>=90?'var(--green)':utilization>=75?'var(--accent)':'var(--red)'}">${utilization.toFixed(1)}<span style="font-size:0.7rem;font-weight:400;">%</span></div><div class="stat-label">利用率</div></div>
    <div class="stat-card"><div class="stat-value stat-red">${(totalWaste/1000).toFixed(2)}<span style="font-size:0.7rem;font-weight:400;"> m</span></div><div class="stat-label">总损耗</div></div>
  </div>
  <div class="no-print" style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
    <button class="btn btn-outline btn-sm" onclick="copyPlan()">📋 复制方案</button>
    <button class="btn btn-outline btn-sm" onclick="savePDF()">📄 保存 PDF</button>
    <button class="btn btn-outline btn-sm" onclick="savePNG()">🖼️ 保存 PNG</button>
    <button class="btn btn-outline btn-sm" onclick="doPrint()">🖨️ 打印</button>
  </div>`;

  // Detail table
  html += `<div class="card" style="margin-bottom:14px;">
    <div class="card-header"><span class="icon">📋</span> 详细用料</div>
    <div class="card-body"><table class="summary-table"><thead><tr><th>项目</th><th class="mono">数值</th><th>占比</th></tr></thead><tbody>
    <tr><td>原材料总长</td><td class="mono">${(totalRawLength/1000).toFixed(2)} m</td><td>100%</td></tr>
    <tr><td>成品线段总长</td><td class="mono">${(totalOutput/1000).toFixed(2)} m</td><td>${(totalOutput/totalRawLength*100).toFixed(1)}%</td></tr>
    <tr><td>锯缝损耗</td><td class="mono">${(raws.reduce((s,r)=>s+r.kerfTotal,0)/1000).toFixed(3)} m</td><td>${(raws.reduce((s,r)=>s+r.kerfTotal,0)/totalRawLength*100).toFixed(2)}%</td></tr>
    <tr><td>端头损耗</td><td class="mono">${(raws.length*endTrim*2/1000).toFixed(3)} m</td><td>${(raws.length*endTrim*2/totalRawLength*100).toFixed(2)}%</td></tr>
    <tr><td>余料</td><td class="mono">${(raws.reduce((s,r)=>s+r.remaining,0)/1000).toFixed(3)} m</td><td>${(raws.reduce((s,r)=>s+r.remaining,0)/totalRawLength*100).toFixed(2)}%</td></tr>
    </tbody></table></div></div>`;

  // Cutting plan — group identical layouts, compact list by default
  const planId = 'plan-' + Date.now();

  // Group raw instances by identical cutting pattern
  const patternMap = new Map();
  raws.forEach((raw) => {
    const cutsKey = raw.cuts.map(c => c.length).join(',') + '|' + raw.remaining.toFixed(0);
    if (!patternMap.has(cutsKey)) {
      patternMap.set(cutsKey, { raw: raw, count: 0 });
    }
    patternMap.get(cutsKey).count++;
  });
  const patterns = Array.from(patternMap.values());

  html += `<div class="card"><div class="card-header"><span class="icon">📐</span> 切割排版图 <span style="font-size:0.68rem;font-weight:500;padding:2px 8px;border-radius:12px;background:#f0ede7;color:var(--text-muted);">${raws.length} 根 · ${patterns.length} 种排法</span>
    <button class="collapse-toggle no-print" id="toggle-${planId}" onclick="togglePlan('${planId}')">📊 展开图形</button>
  </div>
  <div class="card-body">
    <div class="compact-list" id="compact-${planId}">`;

  // Compact list — grouped
  patterns.forEach((pat, pi) => {
    const raw = pat.raw;
    const totalLen = raw.totalLength;
    const usedLen = totalLen - raw.remaining;
    const groups = [];
    let gi = 0;
    while (gi < raw.cuts.length) {
      let gj = gi;
      while (gj < raw.cuts.length && raw.cuts[gj].length === raw.cuts[gi].length) gj++;
      groups.push({ length: raw.cuts[gi].length, count: gj - gi });
      gi = gj;
    }
    var color = ['#d4641a','#2d7fa8','#5a8a3c','#8b5ea8','#c47a2a','#3d8690','#a8543c','#4a7a5a','#6e5c9a','#b06830','#25667a','#6e8638','#9a5480','#7a5a3a','#3a6a7a'][pi%15];
    var dot = '<span style="display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:2px;vertical-align:middle;background:'+color+';"></span>';
    var pieceStr = groups.map(function(g){ return g.length+'mm'+(g.count>1?'×'+g.count:''); }).join(' + ');
    var wasteStr = raw.remaining > 1 ? ' <span style="color:var(--red);">余'+raw.remaining.toFixed(0)+'mm</span>' : '';
    var cntStr = pat.count > 1 ? ' <b>×'+pat.count+'根</b>' : '';
    html += '<div style="margin-bottom:4px;">'+dot+' '+pieceStr+wasteStr+cntStr+'</div>';
  });

  html += `</div>
    <div class="collapsible-content collapsed" id="bars-${planId}"><div class="bar-container" style="margin-top:12px;">`;

  // Bar visualization — grouped
  patterns.forEach((pat, pi) => {
    const raw = pat.raw;
    const totalLen = raw.totalLength;
    let groups = [];
    let gi2 = 0;
    while (gi2 < raw.cuts.length) {
      let gj = gi2;
      while (gj < raw.cuts.length && raw.cuts[gj].length === raw.cuts[gi2].length) gj++;
      groups.push({ length: raw.cuts[gi2].length, count: gj - gi2, totalWidth: raw.cuts[gi2].length * (gj - gi2) + (gj - gi2 - 1) * kerf });
      gi2 = gj;
    }
    let barSegs = '';
    if (endTrim > 0) barSegs += '<div class="segment waste" style="width:'+(endTrim/totalLen*100).toFixed(2)+'%;" title="端头损耗 '+endTrim+'mm">端</div>';
    let groupIdx = 0;
    groups.forEach((g, gi) => {
      if (gi > 0 && kerf > 0) {
        var kpct = (kerf/totalLen*100).toFixed(2);
        if (parseFloat(kpct) > 0.2) barSegs += '<div class="segment kerf" style="width:'+kpct+'%;" title="锯缝 '+kerf+'mm"></div>';
      }
      var pct = (g.totalWidth/totalLen*100).toFixed(2);
      var cc = getColor(g.length, groupIdx);
      groupIdx += g.count;
      var label = g.totalWidth >= totalLen * 0.07 ? (g.count > 1 ? g.length+'×'+g.count : ''+g.length) : '';
      barSegs += '<div class="segment '+cc+'" style="width:'+pct+'%;" title="'+g.length+'mm × '+g.count+'">'+label+'</div>';
    });
    if (raw.remaining > 0) barSegs += '<div class="segment waste" style="width:'+(raw.remaining/totalLen*100).toFixed(2)+'%;" title="余料 '+raw.remaining.toFixed(0)+'mm">'+raw.remaining.toFixed(0)+'</div>';
    if (endTrim > 0) barSegs += '<div class="segment waste" style="width:'+(endTrim/totalLen*100).toFixed(2)+'%;" title="端头损耗 '+endTrim+'mm">端</div>';
    const usedLen = totalLen - raw.remaining;
    var labelTxt = '#'+(pi+1);
    if (pat.count > 1) labelTxt += ' ×'+pat.count;
    html += '<div class="bar-row"><div class="bar-label">'+labelTxt+'</div><div class="bar-wrap">'+barSegs+'</div><div class="bar-info">'+(totalLen/1000).toFixed(2)+'m→用'+(usedLen/1000).toFixed(2)+'m</div></div>';
  });

  html += `</div></div></div></div>`;

  // Legend
  html += `<div class="card" style="margin-top:14px;"><div class="card-header"><span class="icon">🎨</span> 图例</div>
    <div class="card-body" style="display:flex;flex-wrap:wrap;gap:10px;font-size:0.76rem;">`;
  uniqueLengths.forEach((len,i) => { html += `<span><span class="${getColor(len,i)}" style="display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:4px;vertical-align:middle;"></span> ${len}mm</span>`; });
  html += `<span><span style="display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:4px;vertical-align:middle;background:repeating-linear-gradient(-45deg,transparent,transparent 3px,rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 6px);"></span> 余料/损耗</span>`;
  html += `</div></div>`;

  container.innerHTML = html;
}

// ─── Error display ───
function showError(msg) {
  const container = document.getElementById('results');
  document.getElementById('emptyState').style.display = 'none';
  container.style.display = 'block';
  container.className = 'fade-in';
  container.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
}

// ─── Save PDF — auto-expand bars, then print ───
function savePDF() {
  expandAllForPrint();
  if (window.AndroidBridge && window.AndroidBridge.savePDF) {
    window.AndroidBridge.savePDF();
    return;
  }
  window.print();
}

// ─── Print — auto-expand bars, then print ───
function doPrint() {
  expandAllForPrint();
  if (window.AndroidBridge && window.AndroidBridge.print) {
    window.AndroidBridge.print();
    return;
  }
  window.print();
}

// Helper: expand all collapsed bars and hide compact lists (for clean printing)
function expandAllForPrint() {
  document.querySelectorAll('.collapsible-content.collapsed').forEach(function(el) {
    el.classList.remove('collapsed');
  });
  document.querySelectorAll('.compact-list').forEach(function(el) {
    el.style.display = 'none';
  });
}

// ─── Save PNG (full-page screenshot including scrolled content) ───
async function savePNG() {
  if (window.AndroidBridge && window.AndroidBridge.savePNG) {
    window.AndroidBridge.savePNG();
    return;
  }
  const results = document.getElementById('results');
  if (!results || results.style.display === 'none') return;

  const btn = event && event.target;
  if (btn) { btn.innerHTML = '⏳ 生成中...'; }

  try {
    const canvas = await html2canvas(results, {
      backgroundColor: '#f5f5f0',
      scale: 2,
      useCORS: true,
      logging: false,
      height: results.scrollHeight,
      windowHeight: results.scrollHeight,
    });
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '线材宝-排版方案.png';
      a.click();
      URL.revokeObjectURL(url);
      if (btn) btn.innerHTML = '✅ 已保存！';
      setTimeout(() => { if (btn) btn.innerHTML = '🖼️ 保存 PNG'; }, 1500);
    }, 'image/png');
  } catch (e) {
    if (btn) btn.innerHTML = '🖼️ 保存 PNG';
    alert('保存失败: ' + e.message);
  }
}

// ─── Copy plan ───
function copyPlan() {
  const results = document.getElementById('results');
  if (!results || results.style.display === 'none') return;
  let text = '═══════ 线材宝 · 切割排版方案 ═══════\n\n';
  const statCards = results.querySelectorAll('.stat-card .stat-value');
  if (statCards.length >= 4) {
    text += `使用原材料：${statCards[0].textContent.trim()}\n`;
    text += `产出线段：${statCards[1].textContent.trim()}\n`;
    text += `利用率：${statCards[2].textContent.trim()}\n`;
    text += `总损耗：${statCards[3].textContent.trim()}\n`;
  }
  text += '\n── 详细用料 ──\n';
  results.querySelectorAll('.summary-table tbody tr').forEach(row => {
    const cells = row.querySelectorAll('td');
    if (cells.length >= 3) text += `${cells[0].textContent.padEnd(14)} ${cells[1].textContent.padEnd(12)} ${cells[2].textContent}\n`;
  });
  text += '\n── 切割方案 ──\n';
  const compactItems = results.querySelectorAll('.compact-list div');
  compactItems.forEach(function(item) {
    text += item.textContent.trim().replace(/\s+/g, ' ') + '\n';
  });
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('.btn-outline');
    btns.forEach(b => {
      if (b.textContent.includes('复制')) {
        const orig = b.innerHTML;
        b.innerHTML = '✅ 已复制！';
        setTimeout(() => { b.innerHTML = orig; }, 1500);
      }
    });
  }).catch(() => alert('复制失败，请手动选择文字复制。'));
}

// ─── Toggle plan view: compact ↔ bar visualization ───
function togglePlan(id) {
  const compact = document.getElementById('compact-' + id);
  const bars = document.getElementById('bars-' + id);
  const toggle = document.getElementById('toggle-' + id);
  if (!compact || !bars || !toggle) return;
  const isCollapsed = bars.classList.contains('collapsed');
  if (isCollapsed) {
    bars.classList.remove('collapsed');
    compact.style.display = 'none';
    toggle.innerHTML = '📋 收起图形';
  } else {
    bars.classList.add('collapsed');
    compact.style.display = '';
    toggle.innerHTML = '📊 展开图形';
  }
}

// ─── Start ───
init();
updateStickyBar();
